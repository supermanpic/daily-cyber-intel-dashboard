<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資訊安全資訊每日看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f0f4f8; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { background: linear-gradient(135deg, #1a56db, #1e429f); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
    .header .subtitle { font-size: 0.8rem; opacity: 0.8; margin-left: auto; }
    .tabs-wrapper { background: white; border-bottom: 2px solid #e2e8f0; flex-shrink: 0; overflow-x: auto; scrollbar-width: thin; }
    .tabs { display: flex; padding: 0 16px; min-width: max-content; }
    .tab { padding: 11px 18px; cursor: pointer; border-bottom: 3px solid transparent; color: #64748b; font-size: 0.88rem; white-space: nowrap; transition: all 0.2s; user-select: none; }
    .tab:hover { color: #1a56db; background: #f8faff; }
    .tab.active { color: #1a56db; border-bottom-color: #1a56db; font-weight: 700; background: #f0f6ff; }
    .tab .badge { display: inline-block; background: #e2e8f0; color: #64748b; font-size: 0.7rem; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
    .tab.active .badge { background: #dbeafe; color: #1a56db; }
    iframe { flex: 1; border: none; width: 100%; }
    .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:1.5rem">🛡️</span>
    <h1>資訊安全資訊每日看板</h1>
    <span class="subtitle" id="currentDateLabel"></span>
  </div>
  <div class="tabs-wrapper">
    <div class="tabs" id="tabs"></div>
  </div>
  <iframe id="contentFrame" src="" title="每日資安情報"></iframe>
  <script>
    const DATES = ["2026-05-20"];

    function formatLabel(d) {
      const [y, m, day] = d.split('-');
      return y + '/' + m + '/' + day;
    }
    function isToday(d) {
      const now = new Date();
      const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      return d === today;
    }
    const tabs = document.getElementById('tabs');
    const frame = document.getElementById('contentFrame');
    const label = document.getElementById('currentDateLabel');

    function loadDate(date) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector('[data-date="' + date + '"]');
      if (activeTab) activeTab.classList.add('active');
      frame.src = date + '.html';
      label.textContent = formatLabel(date) + ' 情報';
    }

    if (DATES.length === 0) {
      document.getElementById('contentFrame').style.display = 'none';
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = '尚無情報資料，請等待每日 07:00 自動更新。';
      document.body.appendChild(empty);
    } else {
      DATES.forEach((date) => {
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.setAttribute('data-date', date);
        const todayBadge = isToday(date) ? '<span class="badge">今日</span>' : '';
        tab.innerHTML = formatLabel(date) + todayBadge;
        tab.onclick = () => loadDate(date);
        tabs.appendChild(tab);
      });
      loadDate(DATES[0]);
    }
  </script>
</body>
</html>
